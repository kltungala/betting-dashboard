<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Betting Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
    <div class="d-flex min-vh-100">
        <aside class="sidebar p-3">
            <a class="brand mb-4 d-block text-decoration-none" href="{{ url_for('dashboard') }}">
                Betting Dashboard
            </a>
            <nav class="nav flex-column gap-1">
                <a class="nav-link active" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="nav-link" href="{{ url_for('fights.list_fights') }}">Fights</a>
                <a class="nav-link" href="{{ url_for('bettors.list_bettors') }}">Bettors</a>
                <a class="nav-link" href="{{ url_for('bets.list_bets') }}">Bets</a>
                <a class="nav-link" href="{{ url_for('payments.list_payments') }}">Payments</a>
                <a class="nav-link" href="{{ url_for('ledger.list_ledger') }}">Ledger</a>
                <a class="nav-link" href="{{ url_for('reports.index') }}">Reports</a>
            </nav>
        </aside>

        <main class="flex-grow-1 p-3 p-md-4">
            <div class="d-flex justify-content-end mb-3">
                <button class="btn btn-sm btn-outline-secondary" id="theme-toggle" type="button">Dark mode</button>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="toast align-items-center text-bg-{{ category }} border-0 show mb-2" role="alert">
                        <div class="d-flex">
                            <div class="toast-body">{{ message }}</div>
                            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>
                {% endfor %}
            {% endwith %}
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
