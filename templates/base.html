<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Betting Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
    <div class="d-flex min-vh-100">
        <aside class="sidebar p-3">
            <a class="brand mb-4 d-block text-decoration-none" href="{{ url_for('dashboard') }}">
                Betting Dashboard
            </a>
            <nav class="nav flex-column gap-1">
                <a class="nav-link active" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="nav-link" href="{{ url_for('fights.list_fights') }}">Fights</a>
                <a class="nav-link" href="{{ url_for('bettors.list_bettors') }}">Bettors</a>
                <a class="nav-link" href="{{ url_for('bets.list_bets') }}">Bets</a>
                <span class="nav-link disabled">Payments</span>
                <span class="nav-link disabled">Ledger</span>
                <span class="nav-link disabled">Reports</span>
            </nav>
        </aside>

        <main class="flex-grow-1 p-3 p-md-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endwith %}
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
