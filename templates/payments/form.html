{% extends "base.html" %}
{% block title %}Record Payment | Betting Dashboard{% endblock %}
{% block content %}
<div class="mb-4"><h1 class="h2 mb-1">Record Payment</h1><p class="text-body-secondary mb-0">This reduces the bettor's outstanding balance.</p></div>
<form method="post" class="card border-0 shadow-sm p-3 p-md-4 form-card"><div class="row g-3"><div class="col-md-6"><label class="form-label" for="bettor_id">Bettor</label><select class="form-select" id="bettor_id" name="bettor_id" required><option value="">Choose a bettor</option>{% for bettor in bettors %}<option value="{{ bettor.id }}">{{ bettor.name }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label" for="amount">Amount (₱)</label><input class="form-control" id="amount" name="amount" type="number" step="0.01" min="0.01" required></div><div class="col-md-3"><label class="form-label" for="payment_date">Date</label><input class="form-control" id="payment_date" name="payment_date" type="date" value="{{ today }}" required></div><div class="col-12"><label class="form-label" for="notes">Notes</label><textarea class="form-control" id="notes" name="notes" rows="3"></textarea></div></div><div class="d-flex gap-2 mt-4"><button class="btn btn-primary">Record Payment</button><a class="btn btn-outline-secondary" href="{{ url_for('payments.list_payments') }}">Cancel</a></div></form>
{% endblock %}
